<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Digimon TCG+ OCR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Digimon TCG+ Placement OCR</h1>
        <p>Suba os prints do ranking. Duplicatas são ignoradas automaticamente.</p>

        <div class="upload-section">
            <label class="file-label">
                📁 Escolher Print(s)
                <input type="file" id="imageInput" accept="image/*" multiple>
            </label>
            <span id="fileCount" class="file-count">Nenhum arquivo selecionado</span>
            <div class="btn-group">
                <button id="btnProcessar" onclick="processarImagens()">▶ Processar</button>
                <button onclick="limparTabela()" class="btn-secondary">✕ Limpar</button>
                <button onclick="exportarCSV()" class="btn-success">↓ Exportar CSV</button>
            </div>
        </div>

        <div id="status" class="status-msg">Aguardando print...</div>

        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Member ID</th>
                    <th>Win Points</th>
                    <th>OMW%</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
